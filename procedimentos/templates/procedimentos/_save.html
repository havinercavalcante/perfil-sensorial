{# Requer no contexto: paciente, doc (pode ser None), tipo, conteudo_salvo, atualizado_em, criar_url, is_public #}

<div style="max-width:820px;margin:0 auto 2rem;display:flex;justify-content:flex-end;gap:.75rem;" class="no-print" id="acoesProcedimento">
  {% if is_public %}
  <button onclick="salvarProcedimento()" class="btn btn-primary">
    <i data-lucide="send" style="width:15px;height:15px;"></i> Enviar anamnese
  </button>
  {% else %}
  <button onclick="salvarProcedimento()" class="btn btn-primary">
    <i data-lucide="save" style="width:15px;height:15px;"></i> Salvar documento
  </button>
  <button onclick="window.print()" class="btn btn-secondary">
    <i data-lucide="printer" style="width:15px;height:15px;"></i> Imprimir
  </button>
  {% endif %}
</div>

<script>
(function () {
  const IS_PUBLIC = {{ is_public|yesno:"true,false" }};

  {% if is_public %}
  let SAVE_URL = "{% url 'anamnese_publica_salvar' doc.token_publico %}";
  const IS_NEW = false;
  {% elif doc %}
  let SAVE_URL = "{% url 'salvar_procedimento' paciente.uuid tipo doc.uuid %}";
  const IS_NEW = false;
  {% else %}
  let SAVE_URL = "{{ criar_url }}";
  const IS_NEW = true;
  {% endif %}

  const LISTA_URL = {% if is_public %}null{% else %}"{% url 'lista_procedimentos' paciente.uuid tipo %}"{% endif %};
  const CSRF      = "{{ csrf_token }}";
  const CONTEUDO  = {{ conteudo_salvo|safe }};

  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".edit-block").forEach(function (el, i) {
      el.setAttribute("data-key", "b" + i);
    });
    if (Object.keys(CONTEUDO).length > 0) {
      document.querySelectorAll(".edit-block[data-key]").forEach(function (el) {
        var val = CONTEUDO[el.getAttribute("data-key")];
        if (val !== undefined && val !== "") el.innerHTML = val;
      });
      if (typeof window.onConteudoRestored === "function") {
        window.onConteudoRestored(CONTEUDO);
      }
      {% if atualizado_em %}
      setSavedLabel("Salvo em {{ atualizado_em|date:'d/m/Y' }} às {{ atualizado_em|date:'H:i' }}");
      {% endif %}
    }
  });

  window.salvarProcedimento = function () {
    var conteudo = {};
    document.querySelectorAll(".edit-block[data-key]").forEach(function (el) {
      conteudo[el.getAttribute("data-key")] = el.innerHTML;
    });
    if (typeof window.getExtraConteudo === "function") {
      Object.assign(conteudo, window.getExtraConteudo());
    }

    if (IS_PUBLIC) conteudo.finalizar = true;

    var btn = document.getElementById("btnSalvar");
    btn.disabled = true;
    btn.innerHTML = IS_PUBLIC ? "Enviando…" : "Salvando…";

    fetch(SAVE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-CSRFToken": CSRF },
      body: JSON.stringify(conteudo),
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.ok && IS_PUBLIC && data.finalizado) {
          document.getElementById("acoesProcedimento").style.display = "none";
          var doc = document.querySelector(".laudo-doc");
          if (doc) doc.style.display = "none";
          var msg = document.createElement("div");
          msg.className = "laudo-doc";
          msg.innerHTML = '<p style="text-align:center;font-size:1.1rem;">'
            + '<i data-lucide="check-circle" style="width:32px;height:32px;color:var(--primary);display:block;margin:0 auto .75rem;"></i>'
            + 'Anamnese enviada com sucesso. Obrigado!</p>';
          if (doc) doc.insertAdjacentElement("afterend", msg);
          if (window.lucide) lucide.createIcons();
          return;
        }
        if (data.ok) {
          setSavedLabel("Salvo em " + data.atualizado_em);
          btn.innerHTML = '<i data-lucide="check" style="width:14px;height:14px;"></i> Salvo';
          if (window.lucide) lucide.createIcons();

          /* Primeiro save: atualiza URL sem recarregar */
          if (data.save_url) {
            SAVE_URL = data.save_url;
            window.history.replaceState(null, "", data.edit_url);
          }

          setTimeout(function () {
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="save" style="width:14px;height:14px;"></i> Salvar';
            if (window.lucide) lucide.createIcons();
          }, 2500);
        } else {
          btn.disabled = false;
          btn.innerHTML = "Salvar";
          alert("Erro ao salvar.");
        }
      })
      .catch(function () {
        btn.disabled = false;
        btn.innerHTML = "Salvar";
        alert("Erro de conexão.");
      });
  };

  function setSavedLabel(txt) {
    var el = document.getElementById("savedLabel");
    if (el) el.textContent = txt;
  }
})();
</script>
