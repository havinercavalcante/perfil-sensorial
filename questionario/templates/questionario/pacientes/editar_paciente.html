{% extends "questionario/base.html" %}
{% block title %}Editar Paciente — {{ paciente.nome }}{% endblock %}
{% block extra_css %}
<style>
  @media (max-width: 600px) {
    .form-actions { flex-direction: column; }
    .form-actions .btn { width: 100%; justify-content: center; }
  }
</style>
{% endblock %}
{% block back_button %}<a href="{% url 'detalhe_paciente' paciente.uuid %}" class="btn-back"><i data-lucide="chevrons-left" style="width:14px;height:14px;"></i> {{ paciente.nome }}</a>{% endblock %}
{% block content %}
<div style="max-width:600px; margin:0 auto;">
  <h2 style="font-size:1.4rem; color:var(--primary-dark); margin-bottom:1.5rem;"><i data-lucide="pencil" style="width:20px;height:20px;vertical-align:middle;margin-right:.35rem;"></i>Editar Dados do Paciente</h2>
  <div class="card">
    <form method="post" id="tour-ep-form">
      {% csrf_token %}
      <div class="form-group">
        <label>Nome completo da criança *</label>
        <input type="text" name="nome" value="{{ post.nome|default:paciente.nome }}" required placeholder="Nome da criança">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Data de nascimento *</label>
          <input type="date" name="data_nascimento" value="{{ post.data_nascimento|default:paciente.data_nascimento|date:'Y-m-d' }}" required>
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="tel" name="telefone" value="{{ post.telefone|default:paciente.telefone }}" placeholder="(00) 00000-0000">
        </div>
      </div>
      <div class="form-group">
        <label>Nome do responsável *</label>
        <input type="text" name="responsavel" value="{{ post.responsavel|default:paciente.responsavel }}" required placeholder="Nome do pai/mãe/responsável">
      </div>
      <div class="form-group">
        <label>E-mail do responsável</label>
        <input type="email" name="email_responsavel" value="{{ post.email_responsavel|default:paciente.email_responsavel }}" placeholder="email@exemplo.com">
      </div>
      <div class="form-actions" style="display:flex; flex-wrap:wrap; gap:1rem; margin-top:1rem;">
        <a href="{% url 'detalhe_paciente' paciente.uuid %}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary"><i data-lucide="save" style="width:15px;height:15px;"></i> Salvar Alterações</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>
<script>
(function () {
  var TOUR_KEY = 'im_tour_editar_paciente_v1';
  var ICO = 'style="width:16px;height:16px;vertical-align:middle;margin-right:.3rem;"';

  var etapas = [
    {
      popover: {
        title: '<i data-lucide="pencil" ' + ICO + '></i> Editar Paciente',
        description: 'Atualize os dados cadastrais do paciente sempre que necessário — nome, data de nascimento, telefone e dados do responsável.'
      }
    },
    {
      element: '#tour-ep-form',
      popover: {
        title: '<i data-lucide="clipboard-list" ' + ICO + '></i> Dados do paciente',
        description: 'Edite os campos desejados e clique em <strong>"Salvar Alterações"</strong> para confirmar. As avaliações já realizadas não são afetadas.',
        side: 'top', align: 'start'
      }
    }
  ];

  window.startTour = function(force) {
    var driverFn = window.driver.js.driver;
    var driverObj = driverFn({
      nextBtnText: 'Próximo <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="chevrons-right" aria-hidden="true" style="width:14px;height:14px;" class="lucide lucide-chevrons-right"><path d="m6 17 5-5-5-5"></path><path d="m13 17 5-5-5-5"></path></svg>',
      prevBtnText: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="chevrons-left" aria-hidden="true" style="width:14px;height:14px;" class="lucide lucide-chevrons-left"><path d="m11 17-5-5 5-5"></path><path d="m18 17-5-5 5-5"></path></svg> Anterior',
      doneBtnText: '✓ Concluir',
      onPopoverRender: function(popover) { if (window.lucide && popover && popover.wrapper) lucide.createIcons({ rootElement: popover.wrapper }); },
      onDestroyed: function() { localStorage.setItem(TOUR_KEY, 'done'); },
      steps: etapas
    });
    driverObj.drive();
  };

  document.addEventListener('DOMContentLoaded', function() {
    var forceTour = new URLSearchParams(window.location.search).get('tour') === '1';
    var tourDone = localStorage.getItem(TOUR_KEY) === 'done';
    if (forceTour || !tourDone) {
      setTimeout(function() { window.startTour(true); }, 700);
    }
  });
})();
</script>
{% endblock %}
