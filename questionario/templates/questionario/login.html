<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – CeciSys</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #1A5C4D 0%, #2E7D6B 60%, #4CAF93 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .login-box { background: #fff; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .logo { text-align: center; margin-bottom: 2rem; }
  .logo-icon { font-size: 2.5rem; display: block; margin-bottom: .5rem; }
  .logo h1 { font-size: 1.3rem; color: #1A5C4D; font-weight: 800; }
  .logo p { color: #6B8878; font-size: .85rem; margin-top: .3rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: .83rem; font-weight: 700; color: #6B8878; margin-bottom: .35rem; text-transform: uppercase; letter-spacing: .4px; }
  input { width: 100%; padding: .7rem 1rem; border: 1.5px solid #D8E8E2; border-radius: 8px; font-size: .95rem; color: #1A2B22; transition: border-color .2s; }
  input:focus { outline: none; border-color: #2E7D6B; box-shadow: 0 0 0 3px rgba(46,125,107,.12); }
  .btn { width: 100%; padding: .75rem; border: none; border-radius: 8px; background: #2E7D6B; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: .5rem; transition: background .2s; }
  .btn:hover { background: #1A5C4D; }
  .link-row { text-align: center; margin-top: 1.2rem; font-size: .87rem; color: #6B8878; }
  .link-row a { color: #2E7D6B; font-weight: 600; text-decoration: none; }
  .link-row a:hover { text-decoration: underline; }
  .alert { padding: .75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .87rem; background: #FEE2E2; color: #991B1B; border-left: 4px solid #EF4444; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <img src="/static/logo.png" alt="Logo" style="height:130px; width:auto; display:block; margin:0 auto 1.2rem auto; border-radius:14px; background:#fff; padding:6px;">
     <p>Sistema de avaliação pediátrica</p>
  </div>
  {% for msg in messages %}
  <div class="alert">{{ msg }}</div>
  {% endfor %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Usuário</label>
      <input type="text" name="username" autofocus autocomplete="username" placeholder="Seu nome de usuário">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" name="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button type="submit" class="btn">Entrar</button>
  </form>
  <div class="link-row" style="margin-top:0.7rem;">
    <a href="{% url 'password_reset' %}">Esqueceu a senha?</a>
  </div>
  <div class="link-row">
    Não tem conta? <a href="{% url 'registrar' %}">Criar conta</a>
  </div>
</div>
</body>
</html>
