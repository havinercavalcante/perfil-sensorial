<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Plano vencido</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;padding:20px;">
  <div style="max-width:560px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.1);">
    <div style="background:linear-gradient(135deg,#dc2626,#ef4444);padding:28px 32px;text-align:center;">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">⛔</div>
      <h1 style="color:#fff;margin:0;font-size:1.3rem;">Seu plano foi encerrado</h1>
    </div>
    <div style="padding:28px 32px;">
      <p style="font-size:.95rem;color:#333;margin-bottom:1rem;">Olá, <strong>{{ nome }}</strong>!</p>
      <p style="font-size:.9rem;color:#555;line-height:1.7;margin-bottom:1.5rem;">
        Seu plano <strong>{{ plano }}</strong> no IntegraMente chegou ao fim.
        Seus dados e histórico de pacientes estão <strong>preservados</strong> — basta renovar para voltar a ter acesso completo.
      </p>
      <div style="text-align:center;">
        <a href="{{ url_renovar }}" style="background:linear-gradient(135deg,#0c3c7b,#39abcb);color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:700;font-size:1rem;display:inline-block;">
          Renovar meu plano →
        </a>
      </div>
      <p style="margin-top:20px;font-size:.78rem;color:#aaa;text-align:center;">
        Em caso de dúvidas, responda este e-mail.
      </p>
    </div>
  </div>
</body>
</html>
