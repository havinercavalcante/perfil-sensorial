server {
    listen 80;
    server_name integramente.pro www.integramente.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name integramente.pro www.integramente.pro;

    ssl_certificate     /etc/letsencrypt/live/integramente.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/integramente.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Cabeçalhos de segurança ───────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /static/ {
        alias /root/perfil_sensorial/staticfiles/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
    }
}
